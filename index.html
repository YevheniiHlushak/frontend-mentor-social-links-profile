<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <h1 class="visually-hidden">Profile card</h1>
      <article class="profile-card">
        <div class="profile-card__thumb">
          <img
            class="profile-card__image"
            src="./images/avatar-jessica.jpeg"
            alt="avatar of a person"
            width="88"
            height="88"
            loading="lazy"
          />
        </div>

        <div class="profile-card__info">
          <h2 class="profile-card__name">Jessica Randall</h2>
          <p class="profile-card__location">London, United Kingdom</p>
          <p class="profile-card__position">
            "Front-end developer and avid reader."
          </p>
        </div>
        <ul class="profile-card__list">
          <li class="profile-card__item">
            <a
              href="https://github.com"
              class="profile-card__link"
              rel="noopener noreferrer"
              target="_blank"
              aria-label="GitHub (opens in a new tab)"
              >GitHub</a
            >
          </li>
          <li class="profile-card__item">
            <a
              href="https://www.frontendmentor.io"
              class="profile-card__link"
              rel="noopener noreferrer"
              target="_blank"
              aria-label="Frontend Mentor (opens in a new tab)"
              >Frontend Mentor</a
            >
          </li>
          <li class="profile-card__item">
            <a
              href="https://www.linkedin.com"
              class="profile-card__link"
              rel="noopener noreferrer"
              target="_blank"
              aria-label="LinkedIn (opens in a new tab)"
              >LinkedIn</a
            >
          </li>
          <li class="profile-card__item">
            <a
              href="https://x.com"
              class="profile-card__link"
              rel="noopener noreferrer"
              target="_blank"
              aria-label="Twitter (opens in a new tab)"
              >Twitter</a
            >
          </li>
          <li class="profile-card__item">
            <a
              href="https://www.instagram.com"
              class="profile-card__link"
              rel="noopener noreferrer"
              target="_blank"
              aria-label="Instagram (opens in a new tab)"
              >Instagram</a
            >
          </li>
        </ul>
      </article>

      <footer>
        <p class="attribution">
          Challenge by
          <a
            href="https://www.frontendmentor.io?ref=challenge"
            rel="noopener noreferrer"
            target="_blank"
            aria-label="Frontend Mentor (opens in a new tab)"
            >Frontend Mentor</a
          >. Coded by
          <a
            href="https://github.com/YevheniiHlushak"
            rel="noopener noreferrer"
            target="_blank"
            aria-label="GitHub (opens in a new tab)"
            >Yevhenii Hlushak</a
          >.
        </p>
      </footer>
    </main>
  </body>
</html>
